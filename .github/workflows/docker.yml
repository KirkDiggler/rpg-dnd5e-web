name: Build and Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting and type check
        run: |
          npm run format:check
          npm run lint
          npm run typecheck

      - name: Build application
        run: npm run build

      - name: Run tests
        run: echo "No tests yet - add with Vitest"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Sync Synty assets from private repo
        env:
          ASSETS_READ_TOKEN: ${{ secrets.ASSETS_READ_TOKEN }}
        run: |
          set -e
          if [ -z "$ASSETS_READ_TOKEN" ]; then
            echo "::warning::ASSETS_READ_TOKEN is not set — building WITHOUT Synty assets. Set the ASSETS_READ_TOKEN repo secret to enable this step."
            exit 0
          fi

          TMP_DIR=$(mktemp -d)
          git clone --depth 1 "https://x-access-token:${ASSETS_READ_TOKEN}@github.com/KirkDiggler/rpg-game-assets.git" "$TMP_DIR"

          mkdir -p public/models/synty
          cp -r "$TMP_DIR"/harness/models/synty/. public/models/synty/
          rm -rf "$TMP_DIR"

          FILE_COUNT=$(find public/models/synty -type f | wc -l)
          echo "Synced $FILE_COUNT Synty asset file(s) from rpg-game-assets into public/models/synty/"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_DISCORD_CLIENT_ID=${{ secrets.VITE_DISCORD_CLIENT_ID }}
            VITE_API_HOST=${{ secrets.VITE_API_HOST }}

      - name: Trigger deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: benc-uk/workflow-dispatch@e2e5e9a103e331dad343f381a29e654aea3cf8fc # v1.2.4
        with:
          workflow: deploy.yml
          repo: KirkDiggler/rpg-deployment
          token: ${{ secrets.DEPLOYMENT_TOKEN }}
          inputs: '{"source": "rpg-dnd5e-web", "sha": "${{ github.sha }}"}'
